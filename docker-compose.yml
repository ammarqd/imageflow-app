services:
  db:
    image: postgres:18
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    image: imageflow-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    image: imageflow-worker
    command: celery -A celery_app worker --concurrency=8 --max-tasks-per-child=200 --loglevel=info
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/.venv
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - outputs_data:/app/outputs:ro
    depends_on:
      - api

volumes:
  uploads_data:
  outputs_data: